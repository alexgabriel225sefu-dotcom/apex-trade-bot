services:
  # 'web' (not 'background') so it works on Render's FREE plan.
  # The bot's built-in dashboard binds to $PORT, so Render's health checks pass.
  - type: web
    name: apex-trade-bot
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    autoDeploy: false
    envVars:
      # The ONLY thing the client enters. Everything else (exchange, API keys,
      # strategy, risk) is configured on aicashsystem.space/configurator and
      # loaded automatically at startup via cfg.loadRemote().
      - key: LICENSE_KEY
        sync: false
